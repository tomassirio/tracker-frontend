name: Merge to Master

on:
  push:
    branches:
      - master

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    # Skip if commit was made by CI (prevents infinite loop)
    if: >-
      !startsWith(github.event.head_commit.message, 'ci: ')
    outputs:
      release-version: ${{ steps.set-release-version.outputs.version }}
      base-version: ${{ steps.set-release-version.outputs.base-version }}
      skip: ${{ steps.set-release-version.outputs.skip }}
    permissions:
      contents: write
    steps:
      - name: Debug push event
        run: |
          echo "Head commit message: ${{ github.event.head_commit.message }}"
          echo "Head commit author: ${{ github.event.head_commit.author.email }}"
          echo "Actor: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Set release version
        id: set-release-version
        run: |
          CURRENT_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          BASE_VERSION=$(echo "$CURRENT_VERSION" | sed 's/-SNAPSHOT//' | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$CURRENT_VERSION" | grep -oP '\+\K[0-9]+' || echo "1")
          RELEASE_VERSION="${BASE_VERSION}+${BUILD_NUMBER}"
          
          echo "📋 Current version in pubspec.yaml: ${CURRENT_VERSION}"
          echo "📋 Base version: ${BASE_VERSION}"
          echo "📋 Release version: ${RELEASE_VERSION}"
          
          # Check if tag already exists - skip release if so
          if git rev-parse "v${BASE_VERSION}" >/dev/null 2>&1; then
            echo "⚠️ Tag v${BASE_VERSION} already exists, skipping release"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ Tag v${BASE_VERSION} does not exist, proceeding with release"
          
          sed -i "s/^version: .*/version: ${RELEASE_VERSION}/" pubspec.yaml
          
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV
          echo "version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "base-version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Commit release version
        if: steps.set-release-version.outputs.skip != 'true'
        run: |
          if ! git diff --quiet pubspec.yaml; then
            git add pubspec.yaml
            git commit -m "ci: Release version ${RELEASE_VERSION}"
          else
            echo "No version changes to commit"
          fi

      - name: Create Git tag
        if: steps.set-release-version.outputs.skip != 'true'
        run: |
          BASE_VERSION="${{ steps.set-release-version.outputs.base-version }}"
          git tag -a "v${BASE_VERSION}" -m "Release version ${RELEASE_VERSION}"

      - name: Push changes and tags
        if: steps.set-release-version.outputs.skip != 'true'
        run: |
          REMOTE_URL="https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git"
          git push "${REMOTE_URL}" master || echo "⚠️ Could not push release commit to master (branch protection). Tag will still be created."
          git push "${REMOTE_URL}" --tags

  test-and-coverage:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.base-version }}
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Run tests with coverage
        run: make test

      - name: Extract coverage and update README badges
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BASE_VERSION="${{ needs.prepare-release.outputs.base-version }}"
          
          if [ -f "coverage/lcov.info" ]; then
            sudo apt-get update && sudo apt-get install -y lcov
            COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP 'lines......: \K[0-9.]+' | head -1 || echo "0")
            COVERAGE=$(printf "%.0f" "$COVERAGE")
            
            if [ "$COVERAGE" -ge 80 ]; then COVERAGE_COLOR="brightgreen"
            elif [ "$COVERAGE" -ge 60 ]; then COVERAGE_COLOR="yellow"
            elif [ "$COVERAGE" -ge 40 ]; then COVERAGE_COLOR="orange"
            else COVERAGE_COLOR="red"; fi
          else
            COVERAGE="N/A"
            COVERAGE_COLOR="lightgrey"
          fi
          
          if [ -f "README.md" ]; then
            # Fetch the latest README from master via the API
            git config user.name "GitHub Actions"
            git config user.email "github-actions@github.com"
            git fetch origin master
            git checkout master
            git pull origin master --rebase
            
            sed -i "s/version-[0-9.]*-blue/version-${BASE_VERSION}-blue/" README.md
            sed -i "s|coverage-[^)]*|coverage-${COVERAGE}%25-${COVERAGE_COLOR}|" README.md
            
            if ! git diff --quiet README.md; then
              # Use the GitHub API to create the commit, bypassing branch protection
              README_CONTENT=$(base64 -w 0 README.md)
              README_SHA=$(gh api repos/${{ github.repository }}/contents/README.md --jq '.sha')
              gh api repos/${{ github.repository }}/contents/README.md \
                -X PUT \
                -f message="ci: Update README badges" \
                -f content="$README_CONTENT" \
                -f sha="$README_SHA" \
                -f branch="master" || echo "⚠️ Could not update README badges (branch protection). Skipping."
            fi
          fi

  build-web-app:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare-release.outputs.base-version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Build web application
        run: make build

      - name: Create release archive
        run: tar -czf tracker-frontend-web.tar.gz -C build/web .

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: tracker-frontend-web.tar.gz
          retention-days: 1

  create-release:
    needs:
      - prepare-release
      - test-and-coverage
      - build-web-app
    if: needs.prepare-release.outputs.skip != 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release-notes.yml
    with:
      release-version: ${{ needs.prepare-release.outputs.base-version }}
      checkout-ref: v${{ needs.prepare-release.outputs.base-version }}
      artifact-name: web-build


  build-release-docker-images:
    needs: prepare-release
    if: needs.prepare-release.outputs.skip != 'true'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-build.yml
    with:
      push-to-registry: true
      image-tag: v${{ needs.prepare-release.outputs.base-version }}
      checkout-ref: v${{ needs.prepare-release.outputs.base-version }}
    secrets:
      registry-username: ${{ github.actor }}
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-production:
    needs:
      - prepare-release
      - build-release-docker-images
      - test-and-coverage
    if: needs.prepare-release.outputs.skip != 'true'
    uses: ./.github/workflows/helm-deploy.yml
    with:
      environment: prod
      image-tag: v${{ needs.prepare-release.outputs.base-version }}
      namespace: wanderer
    secrets:
      TWINGATE_SERVICE_KEY: ${{ secrets.TWINGATE_SERVICE_KEY }}
      KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_CONTENT }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

  finalize-release:
    needs:
      - prepare-release
      - create-release
      - test-and-coverage
    if: needs.prepare-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Pull latest master
        run: git pull origin master --rebase

      - name: Set next development version
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BASE_VERSION="${{ needs.prepare-release.outputs.base-version }}"
          
          # Split version into major.minor.patch and increment patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))-SNAPSHOT"
          
          # Update pubspec.yaml and commit only if changed
          sed -i "s/^version: .*/version: ${NEXT_VERSION}/" pubspec.yaml
          
          if ! git diff --quiet pubspec.yaml; then
            # Use the GitHub API to create the commit, bypassing branch protection
            PUBSPEC_CONTENT=$(base64 -w 0 pubspec.yaml)
            PUBSPEC_SHA=$(gh api repos/${{ github.repository }}/contents/pubspec.yaml --jq '.sha')
            gh api repos/${{ github.repository }}/contents/pubspec.yaml \
              -X PUT \
              -f message="ci: Prepare for next development iteration (${NEXT_VERSION})" \
              -f content="$PUBSPEC_CONTENT" \
              -f sha="$PUBSPEC_SHA" \
              -f branch="master" || echo "⚠️ Could not push next dev version (branch protection). Manual version bump may be needed."
          else
            echo "Version already set to ${NEXT_VERSION}"
          fi

